project: diagram-copilot
description: Spec-driven development workbench - visualize project.yaml and drive the superpowers workflow

items:
  # ---- frontend screens ----
  - id: app-shell
    name: App shell + tabs
    type: frontend
    status: shipped
    notes: web/src/App.jsx tab container + DetailPanel overlay; shared SSE singleton in web/src/useWorkflowFeed.jsx, chips.jsx badges, resize.jsx panes; Vite 8 + React 19 build in web/.
    flows:
      - { to: plan-project-mode, kind: api, label: "start item workflow" }

  - id: design-view
    name: Design tab (planning chat + canvas)
    type: frontend
    status: shipped
    depends: [app-shell, diagram-view, plan-project-mode, analyze-project-mode]
    notes: web/src/DesignView.jsx; landing tab, split pane of planning chat and embedded architecture diagram; starts plan-project/analyze-project chats.

  - id: diagram-view
    name: Architecture diagram canvas
    type: frontend
    status: shipped
    depends: [app-shell]
    notes: web/src/DiagramView.jsx; react-flow (@xyflow/react 12) + dagre layout, wireframe thumbnails in nodes via iframe, bundled labeled flow edges.

  - id: board-view
    name: Board tab (kanban)
    type: frontend
    status: shipped
    depends: [app-shell]
    notes: web/src/BoardView.jsx; items grouped by planned/in-progress/shipped, pure render of /api/project items.

  - id: schema-view
    name: Schemas tab
    type: frontend
    status: shipped
    depends: [app-shell]
    notes: web/src/SchemaView.jsx; browses item contracts (api/db/event) grouped by owning item, pure render.

  - id: tests-view
    name: Tests tab
    type: frontend
    status: shipped
    depends: [app-shell]
    notes: web/src/TestsView.jsx; all recorded tests grouped by item with pass/fail rollup, pure render.

  - id: priority-view
    name: Priority tab
    type: frontend
    status: shipped
    depends: [app-shell]
    notes: web/src/PriorityView.jsx; ranked ready/blocked work list with per-item Start workflow button.

  - id: workflow-view
    name: Workflow tab (stepper + transcript)
    type: frontend
    status: shipped
    depends: [app-shell, workflow-orchestration]
    notes: web/src/WorkflowView.jsx; pipeline stepper, live chat transcript (non-durable), start/continue/stop/input controls.

  - id: detail-panel
    name: Item detail panel
    type: frontend
    status: shipped
    depends: [app-shell]
    notes: web/src/DetailPanel.jsx; slide-out for selected item, renders spec markdown via /api/spec and full wireframe iframe.

  # ---- backend / integration (being refined) ----
  - id: workflow-session-runner
    name: Workflow session runner + chat
    type: integration
    status: shipped
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    notes: sessions.js; Agent SDK integration, SSE relay, input queue.

  - id: workflow-orchestration
    name: Step orchestration + artifact detection
    type: backend
    status: shipped
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    depends: [workflow-session-runner]
    notes: workflow.js; six-step state machine with human-gated advance, artifact checks, worktree-aware cwd, programmatic yaml updates.

  - id: plan-project-mode
    name: Plan-project chat mode
    type: integration
    status: in-progress
    depends: [workflow-session-runner]
    notes: Chat workflow that interviews you and populates project.yaml with items/depends live. Needs a spec + a real planning session before shipped.

  - id: analyze-project-mode
    name: Analyze-codebase mode
    type: integration
    status: in-progress
    depends: [workflow-session-runner, portable-init]
    spec: docs/superpowers/specs/2026-07-11-analyze-project-design.md
    notes: Reverse-engineers an existing repo into project.yaml via parallel Explore subagents; completion via .superpowers/analyze-report.md.

  - id: portable-init
    name: Portable init + CLI
    type: backend
    status: shipped
    notes: server.js bin entry; diagram-copilot init scaffolds project.yaml/AGENTS.md/.gitignore in any repo and serves; default ./project.yaml.

  # ---- planned work (not yet built) ----
  - id: workflow-execute-viz
    name: Execute/TDD/review visualization
    type: frontend
    status: planned
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    depends: [workflow-orchestration]
    notes: Stream parsing (Task/Bash/TodoWrite), task grid, red-green TDD timeline, review findings panel.

  - id: workflow-finish-polish
    name: Finish step + resilience polish
    type: integration
    status: planned
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    depends: [workflow-execute-viz]
    notes: Finish buttons (merge/PR/keep/discard), resume/retry, interrupted/error states.
