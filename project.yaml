name: diagram-copilot
description: Spec-driven development workbench - visualize project.yaml and drive the superpowers workflow

items:
  - id: workflow-session-runner
    name: Workflow session runner + chat
    type: integration
    status: shipped
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    notes: Agent SDK integration, SSE relay, input endpoint, Workflow tab with transcript + chat, start + brainstorm step.

  - id: workflow-orchestration
    name: Step orchestration + artifact detection
    type: backend
    status: in-progress
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    depends: [workflow-session-runner]
    notes: Implemented - six-step state machine with auto-advance, per-step skill prompts, artifact checks (spec/worktree/plan/DONE progress/review file/worktree-gone), worktree-aware cwd, start-at-step, stop, programmatic yaml updates (spec, in-progress, shipped-on-merge). Unit-tested; still needs one real end-to-end pipeline run before calling it shipped.

  - id: plan-project-mode
    name: Plan-project chat mode
    type: integration
    status: in-progress
    depends: [workflow-session-runner]
    notes: Chat workflow that interviews you and populates project.yaml with items/depends live. Needs a spec + a real planning session before shipped.

  - id: portable-init
    name: Portable init + CLI
    type: backend
    status: shipped
    notes: diagram-copilot init scaffolds project.yaml/AGENTS.md/.gitignore in any repo and starts serving; bin entry + default ./project.yaml.

  - id: living-blueprint
    name: Planning tab + wireframe blueprint
    type: frontend
    status: shipped
    spec: docs/superpowers/specs/2026-07-10-living-blueprint-design.md
    depends: [plan-project-mode]
    notes: Planning tab (plan-project chat + live canvas), wireframe HTML rendered in diagram nodes, element-anchored nav/api/data flow edges parsed from data-flow-to attributes.

  - id: workflow-execute-viz
    name: Execute/TDD/review visualization
    type: frontend
    status: planned
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    depends: [workflow-orchestration]
    notes: Stream parsing (Task/Bash/TodoWrite), task grid, red-green TDD timeline, review findings panel.

  - id: workflow-finish-polish
    name: Finish step + resilience polish
    type: integration
    status: planned
    spec: docs/superpowers/specs/2026-07-09-workflow-tab-design.md
    depends: [workflow-execute-viz]
    notes: Finish buttons (merge/PR/keep/discard), resume/retry, interrupted/error states.
